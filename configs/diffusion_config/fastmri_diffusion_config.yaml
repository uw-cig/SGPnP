setting:
  experiment_type: conditional_sampling # [train_in_kspace, test]
  method: diffusion
  inverse_problem_type: fastmri_reconstruction
  
inverse_problems:
  fastmri_reconstruction:
    name: fastmri_reconstruction
    acceleration_rate: 4

  gaussian_blur:
    name: gaussian_blur
    kernel_size: 61
    intensity: 3.0

  box_inpainting:
    name: inpainting
    mask_opt:
      mask_type: box
      mask_len_range: !!python/tuple [128, 129]  # for box
      image_size: 256
  
  random_inpainting:
    name: inpainting
    mask_opt:
      mask_type: random
      mask_prob_range: !!python/tuple [0.3, 0.7]  # for random
      image_size: 256

  motion_blur:
    name: motion_blur
    kernel_size: 61
    intensity: 0.5

  super_resolution: 
    name: super_resolution
    in_shape: !!python/tuple [1, 3, 256, 256]
    scale_factor: 4

inverse_problem_solvers:
  dps:
    method: dps
    params:
      scale: 1.1
  dds:
    method: dds
    params:
      gamma: 0.95
      CG_iters: 5
  ddnm:
      method: ddnm
      params:
        gamma: 0
  pnpscore:
      method: pnpscore
      params:
        gamma: 0
  diffpir:
      method: diffpir
      params:
        gamma: 0
  classical_pnpscore:
    method: classical_pnpscore
    params:
      gamma: 0

langevin:
  num_iters: 1000

MACNet_setting:
  MACNet_LossType: '' # "MACNet_pred_diffusion_pred_xstart", "MACNet_pred_xstart"
  model_path: ''

measurement:
  operator:
    name: fastmri_reconstruction
  noise: 
    name: gaussian
    sigma: 0.00

conditioning:
  method: dds   # [dps, dds, ddnm]
  params:
    # scale: 1.5
    # scale: 5.
    scale: 4.

noisy_training_data:
  training_data_noiselevel: 0.00
  tau_SURE: 0.0
  lr_SURE: 0.0

train:
  batch_size: 1
  num_workers: 1
  lr: 0.0001
  compute_vb_loss: False
  activate_tv_loss: False
  lr_tv: 0

diffusion:
  diffusion_predtype: epsilon
  noise_schedule: linear
  latent_type: image_space  # [image_space, measurement_space]
  # train_cond_diffusion: False
  diffusion_model_type: unconditional_diffusion # [unconditional, measurement_conditional, mask_conditional]
  # mask_condition_type: none, # [none, concatenation, thresholding_masked_value]
  # mask_condition_type: dont_degrade_input # [none, concatenation, thresholding_masked_value]
  mask_condition_type: degrade_input # [none, concatenation, thresholding_masked_value]
  image_size: 256
  microbatch: -1
  learn_sigma: False
  in_channels: 2
  cond_channels: 0
  num_channels: 128
  # num_res_blocks: 1
  num_res_blocks: 2
  channel_mult: ""
  class_cond: False
  use_checkpoint: False
  attention_resolutions: "32,16,8"
  num_heads: 4
  num_head_channels: 64
  num_heads_upsample: -1
  use_scale_shift_norm: True
  dropout: 0.0
  resblock_updown: True
  use_fp16: False
  # use_fp16: True
  use_new_attention_order: False
  #####
  # Below is for the test configuration
  #####
  model_path: ''
  use_ddim: false
  timestep_respacing: ''
  learnable_dataconsistency: False

dataset:
  dataset_name: fastmri
  mask_pattern: "uniformly_cartesian"  #['randomly_cartesian', 'uniformly_cartesian']
  num_multi_slice: 3
  acceleration_rate: 4
  noise_snr: 40

test:
  diffusion:
    use_ddim: True
    ddim_eta: 0.85
    num_samples: 100
    timestep_respacing: 'ddim1000'
    # timestep_respacing: ''
    clip_denoised: False

  ckpt_path: "ema_0.9999_350000.pt"
  desc: testing300slices
